name: compliance

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  compliance:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install runtime
        run: python -m pip install -e .

      - name: Run compliance suite
        run: make compliance

      - name: Validate benchmark smoke preflight
        run: make benchmark-smoke
